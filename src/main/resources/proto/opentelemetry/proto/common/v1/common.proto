// =============================================================================
// OpenTelemetry 공통 데이터 타입 정의 (v1.3.2 vendor)
// 출처: https://github.com/open-telemetry/opentelemetry-proto/blob/v1.3.2/opentelemetry/proto/common/v1/common.proto
//
// 목적:
//   OTLP의 traces/metrics/logs 신호 어디에서든 공용으로 쓰이는 기본 타입을 모아둔 파일.
//   "속성(attribute)"을 표현하는 KeyValue/AnyValue 와, 계측 라이브러리 식별용 InstrumentationScope 가 핵심.
// =============================================================================
syntax = "proto3";

// proto package — gRPC wire 상에서 메시지 풀네임의 prefix가 됨.
// 클라이언트가 이 패키지 이름으로 메시지를 직렬화/역직렬화하므로 OTel 표준값을 그대로 유지해야 호환.
package opentelemetry.proto.common.v1;

// 각 message/enum 마다 별개의 .java 파일을 생성 (옵션 안 주면 outer class 안에 nested 됨)
option java_multiple_files = true;
// 자체 프로젝트 네임스페이스 아래에 생성 (vendoring 한 코드라 standard 이름 그대로 두지 않음)
option java_package = "com.seeker.collector.otlp.proto.common.v1";
// outer class 이름 (java_multiple_files=true 라 거의 안 쓰이지만 충돌 회피용)
option java_outer_classname = "CommonProto";

// -----------------------------------------------------------------------------
// AnyValue — 타입이 정해지지 않은 단일 값
// -----------------------------------------------------------------------------
// OTel attribute 값은 string/bool/int/double 외에 array/map/binary 까지 가능해야 함.
// proto3 의 oneof 를 써서 "이 중 정확히 하나" 의미를 표현.
// 직렬화 시에는 set 된 필드만 wire 에 실려 사이즈 효율적.
// -----------------------------------------------------------------------------
message AnyValue {
  oneof value {
    string string_value = 1;        // 가장 흔한 케이스 (URL, method 등)
    bool bool_value = 2;
    int64 int_value = 3;            // HTTP status code, port 등
    double double_value = 4;        // 실수값 (latency 등)
    ArrayValue array_value = 5;     // ex) ["GET", "POST"]
    KeyValueList kvlist_value = 6;  // 중첩 map (ex. structured log fields)
    bytes bytes_value = 7;          // 바이너리 (해시 등)
  }
}

// AnyValue 들의 배열을 "메시지" 로 한번 더 감싸는 이유:
// proto3 의 repeated 는 oneof 안에 직접 못 들어가기 때문.
message ArrayValue {
  repeated AnyValue values = 1;
}

// 마찬가지로 KeyValue 의 repeated 를 oneof 안에 넣기 위한 wrapper.
message KeyValueList {
  repeated KeyValue values = 1;
}

// -----------------------------------------------------------------------------
// KeyValue — attribute 1쌍
// -----------------------------------------------------------------------------
// OTel 의 attribute(=tag/label) 표현 단위.
// Resource.attributes, Span.attributes, Span.Event.attributes 등 모든 곳에서 List<KeyValue> 형태로 등장.
// -----------------------------------------------------------------------------
message KeyValue {
  string key = 1;     // ex) "http.method", "service.name"
  AnyValue value = 2; // 위의 oneof 중 하나
}

// -----------------------------------------------------------------------------
// InstrumentationScope — 데이터를 만든 계측 라이브러리 식별자
// -----------------------------------------------------------------------------
// "이 span 들은 envoy 의 어떤 tracer 가 만들었나" 를 표시.
// ScopeSpans 묶음의 메타데이터로 들어감. 콜렉터에서는 거의 무시해도 무관.
// -----------------------------------------------------------------------------
message InstrumentationScope {
  string name = 1;                          // ex) "envoy", "io.opentelemetry.spring-boot-3"
  string version = 2;                       // ex) "1.30.0"
  repeated KeyValue attributes = 3;         // scope 자체의 부가 정보
  uint32 dropped_attributes_count = 4;      // attribute 제한 초과로 drop 된 개수
}
