// =============================================================================
// OpenTelemetry Trace 데이터 모델 (v1.3.2 vendor)
// 출처: https://github.com/open-telemetry/opentelemetry-proto/blob/v1.3.2/opentelemetry/proto/trace/v1/trace.proto
//
// 목적:
//   분산 trace 의 "Span" 과 그 묶음 구조(ResourceSpans → ScopeSpans → Span) 를 정의.
//   OTLP/gRPC Export 의 페이로드가 결국 이 구조의 nested list.
//
// 데이터 계층 구조:
//   TracesData
//     └─ ResourceSpans[]              ← 한 서비스 인스턴스가 보낸 묶음
//         ├─ Resource                 ← 보낸 곳 식별 (service.name 등)
//         └─ ScopeSpans[]             ← 같은 계측 라이브러리가 만든 묶음
//             ├─ InstrumentationScope ← 라이브러리 식별 (envoy 등)
//             └─ Span[]               ← 실제 span 들
// =============================================================================
syntax = "proto3";

package opentelemetry.proto.trace.v1;

import "opentelemetry/proto/common/v1/common.proto";
import "opentelemetry/proto/resource/v1/resource.proto";

option java_multiple_files = true;
option java_package = "com.seeker.collector.otlp.proto.trace.v1";
option java_outer_classname = "TraceProto";

// -----------------------------------------------------------------------------
// TracesData — trace 데이터의 최상위 컨테이너
// -----------------------------------------------------------------------------
// OTLP/gRPC 에서는 ExportTraceServiceRequest 가 직접 ResourceSpans 를 들고 있어서
// TracesData 는 안 쓰임. 파일 export 등 비-gRPC 시나리오용 wrapper.
// -----------------------------------------------------------------------------
message TracesData {
  repeated ResourceSpans resource_spans = 1;
}

// -----------------------------------------------------------------------------
// ResourceSpans — "한 출처에서 온 span 들" 묶음
// -----------------------------------------------------------------------------
// 한 Export 호출에 여러 ResourceSpans 가 들어올 수 있음 (콜렉터 체인에서 합쳐 보낼 때).
// resource 가 같다 = service.name+host.name 등이 같다 = 같은 agent 로 식별.
// -----------------------------------------------------------------------------
message ResourceSpans {
  // 데이터 출처 (service.name 등)
  opentelemetry.proto.resource.v1.Resource resource = 1;

  // 동일 출처에서 만든 span 묶음들 (계측 라이브러리별로 분리됨)
  repeated ScopeSpans scope_spans = 2;

  // OTel semantic conventions 스키마 버전 URL (선택)
  string schema_url = 3;
}

// -----------------------------------------------------------------------------
// ScopeSpans — 같은 계측 라이브러리가 만든 span 묶음
// -----------------------------------------------------------------------------
message ScopeSpans {
  // 어느 라이브러리가 만들었나
  opentelemetry.proto.common.v1.InstrumentationScope scope = 1;

  // 실제 span 들
  repeated Span spans = 2;

  // 스키마 버전 URL (선택)
  string schema_url = 3;
}

// -----------------------------------------------------------------------------
// Span — 분산 trace 의 한 작업 단위
// -----------------------------------------------------------------------------
// 한 요청의 처리 구간 1개를 표현.
// trace_id 가 같은 여러 Span 이 parent_span_id 로 트리를 이루어 분산 trace 를 구성.
// -----------------------------------------------------------------------------
message Span {

  // ---- 식별자 ----
  // trace_id: 16 bytes (W3C 표준). 같은 분산 trace 에 속하는 모든 span 이 동일.
  // 와이어에는 bytes 로 실리지만 W3C traceparent 헤더에서는 32-hex 문자열로 표현됨.
  bytes trace_id = 1;

  // span_id: 8 bytes (W3C 표준). span 자체의 고유 ID.
  // W3C traceparent 헤더에서는 16-hex 로 표현.
  bytes span_id = 2;

  // tracestate: W3C tracestate 헤더 원문 ("vendor1=foo,vendor2=bar")
  string trace_state = 3;

  // 부모 span_id (8 bytes). root span 은 비어 있음 (length 0).
  // null 이 아니라 "빈 바이트열" 로 root 를 표현하는 게 핵심 — proto3 는 optional 이 없어서.
  bytes parent_span_id = 4;

  // W3C trace flags (sampling 비트 등). 32-bit fixed.
  // 필드 번호 16 인 이유: 후방 호환성 위해 나중에 추가됨 → 번호 순서 비순차.
  fixed32 flags = 16;

  // ---- 메타 ----
  // span 이름 (ex. "GET /users/:id", "ingress")
  string name = 5;

  // span 종류 — 서버 처리인지 클라이언트 호출인지 구분
  enum SpanKind {
    SPAN_KIND_UNSPECIFIED = 0;
    SPAN_KIND_INTERNAL = 1;   // 프로세스 내부 작업
    SPAN_KIND_SERVER = 2;     // 들어온 요청 처리 (Envoy ingress 등)
    SPAN_KIND_CLIENT = 3;     // 외부로 나가는 호출 (Envoy egress 등)
    SPAN_KIND_PRODUCER = 4;   // 메시지 produce
    SPAN_KIND_CONSUMER = 5;   // 메시지 consume
  }
  SpanKind kind = 6;

  // ---- 시간 (단위: nanoseconds since epoch) ----
  // 우리 내부 모델은 millis 라 변환 필요 (/1_000_000)
  fixed64 start_time_unix_nano = 7;
  fixed64 end_time_unix_nano = 8;

  // ---- 속성 (KeyValue 리스트) ----
  // http.method, http.status_code, net.peer.ip 등 semantic conventions 키들이 들어감
  repeated opentelemetry.proto.common.v1.KeyValue attributes = 9;
  uint32 dropped_attributes_count = 10;

  // ---- Span Event — span 내부의 시점 사건 ----
  // exception 발생, 캐시 미스 같은 "한 점" 사건을 timestamp 와 함께 기록.
  // (우리 매퍼에서는 모두 드롭 — 결정사항)
  message Event {
    fixed64 time_unix_nano = 1;
    string name = 2;
    repeated opentelemetry.proto.common.v1.KeyValue attributes = 3;
    uint32 dropped_attributes_count = 4;
  }
  repeated Event events = 11;
  uint32 dropped_events_count = 12;

  // ---- Span Link — 다른 trace/span 과의 인과 관계 (비-부모) ----
  // 메시지 큐에서 produce → consume 시 다른 trace 를 link 로 연결할 때 사용.
  // (우리 매퍼에서는 모두 드롭 — Envoy 는 거의 안 emit)
  message Link {
    bytes trace_id = 1;
    bytes span_id = 2;
    string trace_state = 3;
    repeated opentelemetry.proto.common.v1.KeyValue attributes = 4;
    uint32 dropped_attributes_count = 5;
    fixed32 flags = 6;
  }
  repeated Link links = 13;
  uint32 dropped_links_count = 14;

  // ---- 처리 결과 상태 ----
  Status status = 15;
}

// -----------------------------------------------------------------------------
// Status — span 의 처리 결과
// -----------------------------------------------------------------------------
// 주의: HTTP status code 와 다른 개념 — 그건 attributes["http.status_code"] 에 들어감.
// 여기 Status.code 는 "이 span 의 작업이 성공/실패했는가" 의 OK/ERROR 플래그.
// -----------------------------------------------------------------------------
message Status {
  // 필드 1번은 OTel 1.x 초기에 deprecated_code 가 쓰던 자리 — 호환성 위해 영구 reserved
  reserved 1;

  // ERROR 일 때만 의미있는 메시지 (ex. "connection reset by peer")
  string message = 2;

  enum StatusCode {
    STATUS_CODE_UNSET = 0; // 명시적으로 설정 안 됨 (대부분 정상)
    STATUS_CODE_OK = 1;    // 명시적으로 성공 표시
    STATUS_CODE_ERROR = 2; // 실패
  }
  StatusCode code = 3;
}
